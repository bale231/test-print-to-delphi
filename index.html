<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Lavanderia 3logiS</title>
    <style>
        /* stesso CSS di prima */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 15px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; }
        .articoli { margin: 20px 0; }
        .articolo-item { background: #f8f9fa; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-right: 10px; }
        .totale { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px; text-align: right; font-size: 24px; font-weight: bold; color: #667eea; }
        .status { margin-top: 20px; padding: 10px; border-radius: 8px; text-align: center; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏪 POS Lavanderia 3logiS</h1>
            <p>Sistema di Punto Vendita per Lavanderie</p>
        </div>
        <div class="content">
            <div class="form-group">
                <label>📋 Numero Ticket</label>
                <input type="text" id="ticket" placeholder="es: 2024-001" value="LAV-001">
            </div>
            <div class="form-group">
                <label>👤 Nome Cliente</label>
                <input type="text" id="cliente" placeholder="Nome e Cognome" value="Mario Rossi">
            </div>
            <div class="form-group">
                <label>➕ Aggiungi Articolo</label>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="text" id="nuovo-articolo" placeholder="Descrizione" style="flex: 2;">
                    <input type="number" id="nuovo-qta" placeholder="Q.tà" value="1" style="width: 80px;">
                    <input type="number" id="nuovo-prezzo" placeholder="Prezzo" step="0.01" value="10.00" style="width: 100px;">
                    <button onclick="aggiungiArticolo()">➕ Aggiungi</button>
                </div>
            </div>
            <div class="articoli">
                <h3>📦 Articoli in Scontrino</h3>
                <div id="lista-articoli"></div>
            </div>
            <div class="totale">
                Totale: € <span id="totale">0.00</span>
            </div>
            <div>
                <button onclick="stampaScontrino()">🖨️ Stampa Scontrino</button>
                <button onclick="svuotaScontrino()">🗑️ Svuota</button>
                <button onclick="aggiungiEsempio()">📝 Esempio</button>
            </div>
            <div id="status" class="status"></div>
        </div>
    </div>

    <script>
        let articoli = [];

        function mostraStatus(msg, tipo) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = msg;
            statusDiv.className = `status ${tipo}`;
            setTimeout(() => { statusDiv.className = 'status'; }, 3000);
        }

        // Funzione che usa il bridge iniettato da Delphi
        function stampaConDelphi(dati) {
            if (window.DelphiBridge && window.DelphiBridge.stampa) {
                return window.DelphiBridge.stampa(dati);
            } else {
                console.log('Bridge non disponibile, attendo...');
                return false;
            }
        }

        function aggiornaLista() {
            const listaDiv = document.getElementById('lista-articoli');
            const totaleSpan = document.getElementById('totale');
            if (articoli.length === 0) {
                listaDiv.innerHTML = '<p style="text-align: center; color: #999;">Nessun articolo aggiunto</p>';
                totaleSpan.innerText = '0.00';
                return;
            }
            let html = '', totale = 0;
            articoli.forEach((art, idx) => {
                const subtotale = art.qta * art.prezzo;
                totale += subtotale;
                html += `<div class="articolo-item">
                    <span>${idx+1}.</span>
                    <input value="${art.desc}" onchange="modificaArticolo(${idx}, 'desc', this.value)" style="flex:2">
                    <input type="number" value="${art.qta}" onchange="modificaArticolo(${idx}, 'qta', parseInt(this.value))" style="width:80px">
                    <input type="number" value="${art.prezzo}" step="0.01" onchange="modificaArticolo(${idx}, 'prezzo', parseFloat(this.value))" style="width:100px">
                    <span>€ ${subtotale.toFixed(2)}</span>
                    <button onclick="rimuoviArticolo(${idx})" style="background:#dc3545;padding:5px 10px">✖</button>
                </div>`;
            });
            listaDiv.innerHTML = html;
            totaleSpan.innerText = totale.toFixed(2);
        }

        function aggiungiArticolo() {
            const desc = document.getElementById('nuovo-articolo').value;
            const qta = parseInt(document.getElementById('nuovo-qta').value);
            const prezzo = parseFloat(document.getElementById('nuovo-prezzo').value);
            if (!desc) { mostraStatus('Inserisci descrizione', 'error'); return; }
            articoli.push({ desc, qta, prezzo });
            document.getElementById('nuovo-articolo').value = '';
            document.getElementById('nuovo-qta').value = '1';
            document.getElementById('nuovo-prezzo').value = '10.00';
            aggiornaLista();
            mostraStatus('Articolo aggiunto', 'success');
        }

        function modificaArticolo(idx, campo, val) { articoli[idx][campo] = val; aggiornaLista(); }
        function rimuoviArticolo(idx) { articoli.splice(idx, 1); aggiornaLista(); mostraStatus('Articolo rimosso', 'success'); }
        function svuotaScontrino() { articoli = []; aggiornaLista(); mostraStatus('Scontrino svuotato', 'success'); }
        function aggiungiEsempio() {
            articoli = [
                { desc: 'Lavaggio Camicie', qta: 2, prezzo: 8.50 },
                { desc: 'Stiro Pantaloni', qta: 1, prezzo: 5.00 },
                { desc: 'Lavaggio a Secco', qta: 1, prezzo: 15.00 }
            ];
            aggiornaLista();
            mostraStatus('Esempio caricato', 'success');
        }

        function stampaScontrino() {
            if (articoli.length === 0) { mostraStatus('Aggiungi almeno un articolo', 'error'); return; }
            const ticket = document.getElementById('ticket').value;
            const cliente = document.getElementById('cliente').value;
            if (!ticket || !cliente) { mostraStatus('Compila tutti i campi', 'error'); return; }
            
            const dati = { ticket, cliente, articoli };
            
            if (stampaConDelphi(dati)) {
                mostraStatus('✅ Scontrino inviato!', 'success');
            } else {
                mostraStatus('⏳ Connessione con Delphi...', 'info');
                // Riprova dopo 1 secondo
                setTimeout(() => {
                    if (stampaConDelphi(dati)) {
                        mostraStatus('✅ Scontrino inviato!', 'success');
                    } else {
                        mostraStatus('❌ Delphi non connesso. Riavviare l\'applicazione.', 'error');
                    }
                }, 1000);
            }
        }

        // Verifica presenza del bridge
        function checkBridge() {
            if (window.DelphiBridge) {
                mostraStatus('✅ Connesso a Delphi!', 'success');
                return true;
            }
            return false;
        }

        // Controlla ogni secondo se il bridge è disponibile
        let checkInterval = setInterval(() => {
            if (checkBridge()) clearInterval(checkInterval);
        }, 1000);
        
        window.addEventListener('DOMContentLoaded', () => {
            mostraStatus('⏳ Connessione a Delphi in corso...', 'info');
            checkBridge();
        });
    </script>
</body>
</html>
